<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#8DC63F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Центр 8 за">
<title>Медицинский центр «8 за»</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/app/src/main/res/drawable/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Roboto',sans-serif;background:#F5F5F5;color:#212121;display:flex;flex-direction:column}

:root{
  --green:#8DC63F;
  --green-d:#6fa030;
  --teal:#00BCD4;
  --teal-d:#0097a7;
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --divider:#E0E0E0;
  --text1:#212121;
  --text2:#757575;
  --hint:#BDBDBD;
  --err:#D32F2F;
  --nav:60px;
  --bar:56px;
}

/* ═══════════════════════════════════════
   SCREENS
═══════════════════════════════════════ */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}

/* ═══════════════════════════════════════
   AUTH
═══════════════════════════════════════ */
#authScreen{
  align-items:center;justify-content:center;
  background:linear-gradient(150deg,#8DC63F 0%,#00BCD4 100%);
  padding:20px;overflow-y:auto;
}
.auth-card{
  background:#fff;border-radius:16px;padding:28px 24px;
  width:100%;max-width:380px;
  box-shadow:0 8px 32px rgba(0,0,0,.22);
}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo img{height:60px;object-fit:contain}
.auth-logo h1{font-size:16px;font-weight:700;color:#333;margin-top:8px;line-height:1.3}
.auth-logo p{font-size:12px;color:#888;margin-top:3px}

.auth-step{display:none}
.auth-step.active{display:block}

.flabel{font-size:12px;color:#666;margin-bottom:5px;display:block;font-weight:500;letter-spacing:.3px}
.finput{
  width:100%;padding:12px 14px;border:1.5px solid #ddd;
  border-radius:8px;font-size:15px;outline:none;font-family:inherit;
  background:#fafafa;transition:border-color .2s;
}
.finput:focus{border-color:var(--green);background:#fff}
.fgroup{margin-bottom:16px}

.btn-g{
  width:100%;padding:13px;background:var(--green);color:#fff;
  border:none;border-radius:8px;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.3px;transition:background .15s;
  font-family:inherit;
}
.btn-g:hover{background:var(--green-d)}
.btn-g:disabled{background:#bbb;cursor:not-allowed}
.btn-outline-g{
  width:100%;padding:12px;background:transparent;
  border:1.5px solid var(--green);border-radius:8px;
  font-size:14px;font-weight:600;color:var(--green);
  cursor:pointer;margin-top:10px;font-family:inherit;
  transition:background .15s;
}
.btn-outline-g:hover{background:#f1f8e9}
.btn-link{
  background:none;border:none;color:var(--green);
  font-size:13px;cursor:pointer;padding:8px 0;
  display:block;margin:0 auto;text-decoration:underline;
  font-family:inherit;
}
.auth-hint{font-size:13px;color:#666;text-align:center;margin-bottom:14px;line-height:1.5}
.auth-err{color:var(--err);font-size:12px;margin-top:6px;text-align:center;min-height:16px}
.otp-inp{text-align:center;font-size:30px;font-weight:700;letter-spacing:10px}

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
#appScreen.active{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* Topbar — зелёная как в приложении */
.topbar{
  height:var(--bar);background:var(--green);
  display:flex;align-items:center;padding:0 8px 0 16px;
  flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
  position:relative;z-index:10;
}
.topbar-title{font-size:18px;font-weight:700;color:#fff;flex:1;letter-spacing:.2px}
.topbar-logo{height:30px;object-fit:contain;margin-right:10px;filter:brightness(0) invert(1)}
.btn-topbar{
  background:none;border:none;color:rgba(255,255,255,.9);
  font-size:22px;cursor:pointer;padding:8px;border-radius:50%;
  transition:background .15s;
}
.btn-topbar:hover{background:rgba(0,0,0,.1)}

/* Tab pages */
.tab-page{display:none;flex:1;overflow-y:auto;flex-direction:column;overscroll-behavior:contain}
.tab-page.active{display:flex}

/* Bottom nav — белая как в приложении */
.bottom-nav{
  height:var(--nav);background:#fff;border-top:1px solid var(--divider);
  display:flex;align-items:stretch;flex-shrink:0;
  box-shadow:0 -2px 8px rgba(0,0,0,.08);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--hint);transition:color .15s;padding:4px 2px;
  font-size:10px;font-weight:500;font-family:inherit;
}
.nav-btn svg{width:24px;height:24px;fill:currentColor}
.nav-btn.active{color:var(--green)}
.nav-btn.hidden{display:none}

/* ═══════════════════════════════════════
   HOME / NEWS
═══════════════════════════════════════ */
#tabHome{background:#F5F5F5}
.news-list{padding:8px 8px 70px;display:flex;flex-direction:column;gap:10px}

.news-card{
  background:#fff;border-radius:4px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.14);
  cursor:pointer;transition:box-shadow .2s;
}
.news-card:active{box-shadow:0 4px 8px rgba(0,0,0,.2)}

/* Изображение новости */
.news-img-wrap{
  width:100%;height:180px;overflow:hidden;
  background:#e8f5e9;
  position:relative;
}
.news-img-wrap img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.news-card-body{padding:12px 14px 14px}
.news-card-date{font-size:11px;color:var(--teal);font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.news-card-title{font-size:15px;font-weight:700;color:var(--text1);line-height:1.35;margin-bottom:6px}
.news-card-preview{font-size:13px;color:var(--text2);line-height:1.5}
.news-read-more{font-size:13px;color:var(--green);font-weight:600;margin-top:6px}

.spinner{text-align:center;padding:40px 20px;color:var(--hint);font-size:14px}
.empty{text-align:center;padding:60px 20px;color:var(--hint);font-size:15px}
.empty-icon{font-size:48px;margin-bottom:12px}

/* ═══════════════════════════════════════
   SERVICES
═══════════════════════════════════════ */
#tabServices{background:#F5F5F5}
.chips-bar{
  background:#fff;padding:10px 8px;
  display:flex;gap:6px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;border-bottom:1px solid var(--divider);
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.chips-bar::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:6px 14px;border-radius:16px;
  border:1.5px solid var(--divider);font-size:12px;font-weight:500;
  background:#fff;cursor:pointer;transition:all .15s;
  white-space:nowrap;font-family:inherit;color:#555;
}
.chip.active{border-color:var(--green);color:var(--green);background:#f1f8e9}
.services-list{padding:8px 8px 70px;display:flex;flex-direction:column;gap:1px}

.svc-group-header{
  padding:14px 14px 6px;font-size:12px;font-weight:700;
  color:var(--text2);text-transform:uppercase;letter-spacing:.8px;
}
.svc-card{
  background:#fff;padding:14px 16px;
  border-bottom:1px solid #f0f0f0;
}
.svc-card:last-child{border-bottom:none}
.svc-name{font-size:14px;font-weight:500;color:var(--text1);margin-bottom:7px;line-height:1.35}
.svc-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;
}
.pill-price{background:#E8F5E9;color:#2E7D32}
.pill-dur{background:#E3F2FD;color:#1565C0}

/* ═══════════════════════════════════════
   CONTACTS
═══════════════════════════════════════ */
#tabContacts{background:#F5F5F5}
.info-wrap{padding:8px 8px 70px;display:flex;flex-direction:column;gap:8px}

.info-section{
  background:#fff;border-radius:4px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.1);
}
.info-section-title{
  padding:12px 16px 0;font-size:11px;font-weight:700;
  color:var(--teal);text-transform:uppercase;letter-spacing:.8px;
}
.info-row{
  display:flex;align-items:center;padding:12px 16px;
  border-bottom:1px solid #f5f5f5;gap:14px;
}
.info-row:last-child{border-bottom:none}
.info-icon{width:36px;height:36px;border-radius:50%;background:#F5F5F5;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.info-text-wrap{flex:1}
.info-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.info-val{font-size:14px;color:var(--text1);font-weight:500;line-height:1.4}
.info-val a{color:var(--green);text-decoration:none}
.info-actions{padding:8px 12px 12px;display:flex;gap:8px;flex-wrap:wrap}
.btn-act{
  flex:1;min-width:120px;padding:11px 8px;border-radius:4px;border:none;
  font-size:13px;font-weight:700;cursor:pointer;text-align:center;
  font-family:inherit;transition:background .15s;letter-spacing:.3px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-act-g{background:var(--green);color:#fff}
.btn-act-g:hover{background:var(--green-d)}
.btn-act-t{background:var(--teal);color:#fff}
.btn-act-t:hover{background:var(--teal-d)}
.btn-act-o{background:#fff;color:var(--green);border:1.5px solid var(--green)}
.btn-act-o:hover{background:#f1f8e9}
.hours-pre{font-size:14px;line-height:1.9;white-space:pre-line;color:var(--text1);padding:12px 16px}

.admin-banner{
  background:linear-gradient(135deg,#f1f8e9,#e8f5e9);
  border:1.5px solid var(--green);border-radius:4px;
  padding:14px 16px;
  box-shadow:0 1px 3px rgba(0,0,0,.1);
  display:none;
}
.admin-banner.show{display:block}
.admin-banner-title{font-size:14px;font-weight:700;color:var(--green);margin-bottom:4px}
.admin-banner-sub{font-size:12px;color:var(--text2);margin-bottom:12px}

/* ═══════════════════════════════════════
   CHAT
═══════════════════════════════════════ */
#tabChat{overflow:hidden;background:#fff}
.chat-wrap{flex:1;display:flex;overflow:hidden}

/* Client */
.chat-single{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#F5F5F5}
.chat-messages{
  flex:1;overflow-y:auto;padding:10px 10px 6px;
  display:flex;flex-direction:column;gap:6px;
}
.bubble{
  max-width:75%;padding:9px 13px;border-radius:18px;
  font-size:14px;line-height:1.45;word-break:break-word;
}
.bubble-out{
  background:var(--green);color:#fff;
  align-self:flex-end;border-bottom-right-radius:4px;
}
.bubble-in{
  background:#fff;color:#212121;
  align-self:flex-start;border-bottom-left-radius:4px;
  box-shadow:0 1px 2px rgba(0,0,0,.1);
}
.bubble-label{font-size:10px;font-weight:700;margin-bottom:3px;opacity:.8}
.bubble-time{font-size:10px;margin-top:4px;text-align:right;opacity:.6}
.chat-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--hint);text-align:center;padding:24px;gap:10px;
}
.chat-empty-icon{font-size:48px}
.chat-empty-txt{font-size:14px}
.chat-bar{
  display:flex;align-items:flex-end;gap:8px;
  padding:8px 10px 12px;background:#fff;
  border-top:1px solid var(--divider);
}
.chat-ta{
  flex:1;padding:10px 14px;border:1.5px solid var(--divider);
  border-radius:22px;font-size:14px;resize:none;outline:none;
  font-family:inherit;max-height:100px;background:#fafafa;
  line-height:1.4;transition:border-color .2s;
}
.chat-ta:focus{border-color:var(--teal);background:#fff}
.btn-send{
  background:var(--green);color:#fff;border:none;
  border-radius:50%;width:44px;height:44px;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
.btn-send:hover{background:var(--green-d)}

/* Admin split */
.conv-panel{
  width:250px;border-right:1px solid var(--divider);
  overflow-y:auto;flex-shrink:0;background:#fff;
}
@media(max-width:540px){
  .conv-panel{width:96px}
  .conv-email,.conv-prev{display:none}
}
.conv-hdr{
  padding:12px 14px;font-size:11px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--divider);
  background:#FAFAFA;
}
.conv-item{
  padding:11px 13px;border-bottom:1px solid #f5f5f5;
  cursor:pointer;transition:background .12s;
}
.conv-item:hover{background:#f9fff9}
.conv-item.active{background:#f1f8e9;border-left:3px solid var(--green)}
.conv-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-email{font-size:11px;color:var(--hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.conv-prev{font-size:11px;color:var(--hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* ═══════════════════════════════════════
   MODAL SHEET
═══════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:300;
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
.sheet{
  background:#fff;border-radius:16px 16px 0 0;
  width:100%;max-width:640px;max-height:88vh;
  overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0}
.sheet-title{font-size:17px;font-weight:700;padding:14px 16px 0;color:var(--text1)}
.sheet-date{font-size:12px;color:var(--teal);font-weight:500;padding:6px 16px 0;text-transform:uppercase;letter-spacing:.5px}
.sheet-body{padding:12px 16px 24px;font-size:15px;line-height:1.7;white-space:pre-line;color:var(--text1)}
.sheet-close{
  display:block;margin:0 16px 16px;padding:13px;
  background:#F5F5F5;color:#555;border:none;border-radius:8px;
  font-size:14px;font-weight:700;cursor:pointer;text-align:center;
  width:calc(100% - 32px);font-family:inherit;
}

/* ═══════════════════════════════════════
   ADMIN DIALOG
═══════════════════════════════════════ */
.dialog-wrap{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:400;
  align-items:center;justify-content:center;padding:16px;
}
.dialog-wrap.open{display:flex}
.dialog{
  background:#fff;border-radius:12px;
  width:100%;max-width:340px;padding:22px 20px;
  box-shadow:0 12px 40px rgba(0,0,0,.22);
}
.dialog-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text1)}
.dialog-err{color:var(--err);font-size:12px;margin-bottom:8px;text-align:center;min-height:16px}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast{
  position:fixed;bottom:calc(var(--nav) + 12px);left:50%;
  transform:translateX(-50%) translateY(70px);
  background:#323232;color:#fff;padding:9px 18px;
  border-radius:20px;font-size:13px;z-index:500;
  white-space:nowrap;transition:transform .25s,opacity .25s;opacity:0;
  max-width:calc(100vw - 32px);text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{background:#388E3C}
#toast.err{background:#C62828}

/* Loading */
#loader{
  position:fixed;inset:0;background:rgba(255,255,255,.9);
  display:flex;align-items:center;justify-content:center;
  z-index:600;
}
#loader.off{display:none}
.loader-spin{
  width:40px;height:40px;border:4px solid #e0e0e0;
  border-top-color:var(--green);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader"><div class="loader-spin"></div></div>

<!-- ═══════════════════════════════════════
     AUTH
═══════════════════════════════════════ -->
<div id="authScreen" class="screen">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="app/src/main/res/drawable/logo.png" alt=""
           onerror="this.style.display='none'">
      <h1>Медицинский центр «8 за»</h1>
      <p>г. Калуга</p>
    </div>

    <!-- Шаг 1: Email -->
    <div id="stepEmail" class="auth-step active">
      <div class="fgroup">
        <label class="flabel">Email-адрес</label>
        <input id="inpEmail" class="finput" type="email" placeholder="example@mail.ru"
               autocomplete="email" onkeydown="if(event.key==='Enter')sendOtp()">
      </div>
      <button class="btn-g" onclick="sendOtp()">Получить код</button>
      <div id="errEmail" class="auth-err"></div>
      <button class="btn-outline-g" onclick="openAdminDlg()">⚙ Войти как администратор</button>
    </div>

    <!-- Шаг 2: OTP -->
    <div id="stepOtp" class="auth-step">
      <p class="auth-hint" id="otpHint">Введите 6-значный код из письма</p>
      <div class="fgroup">
        <input id="inpOtp" class="finput otp-inp" type="number"
               placeholder="000000" maxlength="6" inputmode="numeric"
               onkeydown="if(event.key==='Enter')verifyOtp()">
      </div>
      <button class="btn-g" onclick="verifyOtp()">Войти</button>
      <div id="errOtp" class="auth-err"></div>
      <button class="btn-link" onclick="resendOtp()">Не пришло письмо? Отправить ещё раз</button>
      <button class="btn-link" onclick="gotoEmail()">← Изменить email</button>
    </div>

    <!-- Шаг 3: Регистрация -->
    <div id="stepReg" class="auth-step">
      <p class="auth-hint">Добро пожаловать! Введите ваше имя.</p>
      <div class="fgroup">
        <label class="flabel">Ваше имя</label>
        <input id="inpName" class="finput" type="text" placeholder="Иван Иванов"
               autocomplete="name" onkeydown="if(event.key==='Enter')registerUser()">
      </div>
      <button class="btn-g" onclick="registerUser()">Зарегистрироваться</button>
      <div id="errReg" class="auth-err"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     APP
═══════════════════════════════════════ -->
<div id="appScreen" class="screen">

  <!-- Топбар -->
  <div class="topbar">
    <img class="topbar-logo" src="app/src/main/res/drawable/logo.png" alt=""
         onerror="this.style.display='none'">
    <span class="topbar-title" id="topTitle">Главная</span>
    <button class="btn-topbar" onclick="doLogout()" title="Выйти">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
      </svg>
    </button>
  </div>

  <!-- ГЛАВНАЯ -->
  <div id="tabHome" class="tab-page active">
    <div id="newsList" class="news-list"><div class="spinner">⏳ Загрузка…</div></div>
  </div>

  <!-- УСЛУГИ -->
  <div id="tabServices" class="tab-page">
    <div id="chipsBar" class="chips-bar"></div>
    <div id="svcList" class="services-list"><div class="spinner">⏳ Загрузка…</div></div>
  </div>

  <!-- КОНТАКТЫ -->
  <div id="tabContacts" class="tab-page">
    <div id="infoWrap" class="info-wrap"><div class="spinner">⏳ Загрузка…</div></div>
  </div>

  <!-- ЧАТ -->
  <div id="tabChat" class="tab-page">
    <div class="chat-wrap" id="chatWrap"></div>
  </div>

<script>
// ── Firebase ──────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBBVV95bvyjbpYDtkKgmsG9gR1_qAK8-_0",
  authDomain:        "massage-centr.firebaseapp.com",
  projectId:         "massage-centr",
  storageBucket:     "massage-centr.firebasestorage.app",
  messagingSenderId: "713553411914",
  appId:             "1:713553411914:android:f78ac0c3138743c2678bb3"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

// ── Session ─────────────────────────────────────
const S = {
  get email()    { return localStorage.getItem('m_email')    || '' },
  set email(v)   { localStorage.setItem('m_email', v) },
  get emailKey() { return localStorage.getItem('m_key')      || '' },
  set emailKey(v){ localStorage.setItem('m_key', v) },
  get name()     { return localStorage.getItem('m_name')     || '' },
  set name(v)    { localStorage.setItem('m_name', v) },
  get isAdmin()  { return localStorage.getItem('m_admin') === '1' },

  clear(){ ['m_email','m_key','m_name','m_admin'].forEach(k=>localStorage.removeItem(k)) }
};
const toKey = e => e.toLowerCase().trim().replace(/\./g,'_');

// ── Init ─────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  loaderOff();
  if (user && S.emailKey) { await openApp(); }
  else showScreen('authScreen');
});

async function openApp() {
  showScreen('appScreen');
  showTab('home', false);
  buildChatPanel();
  loadNews();
  loadServices();
  loadContacts();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function loaderOff()  { document.getElementById('loader').classList.add('off') }
function loaderOn()   { document.getElementById('loader').classList.remove('off') }

// ── Auth ─────────────────────────────────────────
let pendingEmail = '';

function gotoEmail() {
  setStep('stepEmail');
}
function setStep(id) {
  document.querySelectorAll('.auth-step').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function sendOtp() {
  const email = document.getElementById('inpEmail').value.trim();
  const err   = document.getElementById('errEmail');
  err.textContent = '';
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    err.textContent = 'Введите корректный email'; return;
  }
  loaderOn();
  try {
    const r = await fetch('/api/send-otp', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Ошибка');
    pendingEmail = email;
    document.getElementById('otpHint').textContent = 'Код отправлен на ' + email;
    setStep('stepOtp');
    document.getElementById('inpOtp').value = '';
    document.getElementById('inpOtp').focus();
  } catch(e) { err.textContent = e.message; }
  finally { loaderOff(); }
}

async function resendOtp() {
  if (!pendingEmail) { gotoEmail(); return; }
  document.getElementById('inpEmail').value = pendingEmail;
  await sendOtp();
}

async function verifyOtp() {
  const code = document.getElementById('inpOtp').value.trim();
  const err  = document.getElementById('errOtp');
  err.textContent = '';
  if (!code || code.length !== 6) { err.textContent = 'Введите 6-значный код'; return; }
  loaderOn();
  try {
    const r = await fetch('/api/verify-otp', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ email: pendingEmail, code })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Неверный код');

    await auth.signInAnonymously();
    const emailKey = toKey(pendingEmail);
    S.email    = pendingEmail;
    S.emailKey = emailKey;

    const adminDoc = await db.collection('admins').doc(emailKey).get();
    S.isAdmin = adminDoc.exists;

    const userDoc = await db.collection('users').doc(emailKey).get();
    if (userDoc.exists) {
      S.name = userDoc.data().name || '';
      await openApp();
    } else {
      loaderOff();
      setStep('stepReg');
      document.getElementById('inpName').focus();
    }
  } catch(e) { err.textContent = e.message; loaderOff(); }
}

async function registerUser() {
  const name = document.getElementById('inpName').value.trim();
  const err  = document.getElementById('errReg');
  err.textContent = '';
  if (!name) { err.textContent = 'Введите ваше имя'; return; }
  loaderOn();
  try {
    await db.collection('users').doc(S.emailKey).set({
      emailKey: S.emailKey, email: S.email, name,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    S.name = name;
    await openApp();
  } catch(e) { err.textContent = 'Ошибка: ' + e.message; loaderOff(); }
}

// ── Admin login ───────────────────────────────────
function openAdminDlg()  { document.getElementById('adminDlg').classList.add('open') }
function closeAdminDlg() { document.getElementById('adminDlg').classList.remove('open') }

async function doAdminLogin() {
  const email = document.getElementById('dlgEmail').value.trim();
  const pass  = document.getElementById('dlgPass').value;
  const err   = document.getElementById('dlgErr');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Введите email и пароль'; return; }
  loaderOn();
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    const key = toKey(email);
    const adminDoc = await db.collection('admins').doc(key).get();
    if (!adminDoc.exists) {
      await auth.signOut();
      throw new Error('Нет прав администратора');
    }
    S.email = email; S.emailKey = key; S.isAdmin = true;
    const ud = await db.collection('users').doc(key).get();
    S.name = ud.exists ? (ud.data().name || 'Администратор') : 'Администратор';
    closeAdminDlg();
    await openApp();
  } catch(e) {
    const map = {
      'auth/user-not-found':   'Пользователь не найден',
      'auth/wrong-password':   'Неверный пароль',
      'auth/invalid-email':    'Неверный формат email',
      'auth/too-many-requests':'Слишком много попыток',
    };
    err.textContent = map[e.code] || e.message;
    loaderOff();
  }
}

async function doLogout() {
  if (!confirm('Выйти из аккаунта?')) return;
  stopChat();
  S.clear();

}

// ── NEWS ──────────────────────────────────────────
let allNews = [];

// Та же логика что в Android NewsAdapter.localPhotoFor()
function localPhotoFor(title, index) {
  const t = (title || '').toLowerCase();
  if (t.includes('добро пожаловать') && !t.includes('детск'))
    return '/app/src/main/res/drawable/news_welcome.jpg';
  if (t.includes('центр') || t.includes('января') || t.includes('врач'))
    return '/app/src/main/res/drawable/news_clinic.jpg';
  if (t.includes('детск') || t.includes('малыш') || t.includes('ребён'))
    return '/app/src/main/res/drawable/news_baby.jpg';
  if (t.includes('коррекц') || t.includes('фигур') || t.includes('лимфо'))
    return '/app/src/main/res/drawable/news_photo2.png';
  if (t.includes('выезд') || t.includes('дом'))
    return '/app/src/main/res/drawable/news_photo1.jpg';
  return index % 2 === 0
    ? '/app/src/main/res/drawable/news_photo1.jpg'
    : '/app/src/main/res/drawable/news_photo2.png';
}

function loadNews() {
  db.collection('news').orderBy('date','desc').onSnapshot(snap => {
    allNews = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderNews();
  }, err => {
    console.warn(err);
    db.collection('news').get().then(snap => {
      allNews = snap.docs.map(d => ({id:d.id,...d.data()}));
      renderNews();
    });
  });
}

function renderNews() {
  const el = document.getElementById('newsList');
  if (!allNews.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📰</div>Новостей пока нет</div>';
    return;
  }
  el.innerHTML = allNews.map((n, i) => {
    const date = n.date
      ? new Date(n.date.seconds*1000).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})
      : '';
    // Если есть imageUrl — используем его, иначе локальное фото как в Android
    const localImg = localPhotoFor(n.title, i);
    const src = (n.imageUrl && n.imageUrl.trim()) ? n.imageUrl.trim() : localImg;
    const prev = (n.body||'').slice(0,110);
    const more = (n.body||'').length > 110;
    return `
      <div class="news-card" onclick="openNews('${esc(n.id)}')">
        <div class="news-img-wrap">
          <img src="${esc(src)}" alt=""
               onerror="this.src='${esc(localImg)}'"
               onload="this.style.opacity=1"
               style="opacity:0;transition:opacity .3s">
        </div>
        <div class="news-card-body">
          ${date ? `<div class="news-card-date">${esc(date)}</div>` : ''}
          <div class="news-card-title">${esc(n.title)}</div>
          <div class="news-card-preview">${esc(prev)}${more?'…':''}</div>
          ${more ? '<div class="news-read-more">Читать далее →</div>' : ''}
        </div>
      </div>`;
  }).join('');
}

function openNews(id) {
  const n = allNews.find(x=>x.id===id); if (!n) return;
  const date = n.date
    ? new Date(n.date.seconds*1000).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})
    : '';
  document.getElementById('newsTitle').textContent = n.title || '';
  document.getElementById('newsDate').textContent  = date ? '📅 ' + date : '';
  document.getElementById('newsBody').textContent  = n.body || '';
  document.getElementById('newsOverlay').classList.add('open');
}
function closeNews() { document.getElementById('newsOverlay').classList.remove('open') }

          <div class="svc-card">

          <button class="btn-send" onclick="sendMsg()">➤</button>
        </div>
      </div>`;

function loadMyMsgs() {
  const key = S.emailKey; if (!key) return;
  stopChat();
  chatSub = db.collection('chats').doc(key).collection('messages')
    .orderBy('timestamp').onSnapshot(snap => {
      const el = document.getElementById('chatMsgs'); if (!el) return;
      if (!snap.docs.length) {
        el.innerHTML='<div class="chat-empty"><div class="chat-empty-icon">💬</div><div class="chat-empty-txt">Напишите нам — мы ответим!</div></div>';
        return;
      }
      el.innerHTML = snap.docs.map(d => {
        const m = d.data();
        const t = m.timestamp ? new Date(m.timestamp.seconds*1000).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) : '';
        const isA = m.role==='admin';
        return `<div class="bubble ${isA?'bubble-in':'bubble-out'}">
          ${isA?'<div class="bubble-label">Администратор</div>':''}
          ${esc(m.text)}<div class="bubble-time">${t}</div>
        </div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
    });
}

async function sendMsg() {
  const ta = document.getElementById('chatTa');
  const text = ta.value.trim(); if (!text) return;
  const key = S.emailKey;
  ta.value = ''; grow(ta);
  try {
    await db.collection('chats').doc(key).collection('messages').add({
      text, role:'client',
      senderId: auth.currentUser?.uid || key,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('chats').doc(key).set({
      lastMessage: text,
      lastTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
      userKey: key, userName: S.name || S.email, userEmail: S.email
    }, {merge:true});
  } catch(e) { toast('Ошибка: '+e.message,'err'); }
}

function loadConvs() {
  if (convSub) convSub();
  convSub = db.collection('chats').onSnapshot(snap => {
    const list = document.getElementById('convList'); if (!list) return;
    if (!snap.docs.length) {
      list.innerHTML='<div class="empty" style="font-size:12px;padding:16px">Нет сообщений</div>'; return;
    }
    const convs = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.lastTimestamp?.seconds||0)-(a.lastTimestamp?.seconds||0));
    list.innerHTML = convs.map(c=>`
      <div class="conv-item ${activeCKey===c.id?'active':''}"
           onclick="openConv('${esc(c.id)}','${esc(c.userName||c.id)}','${esc(c.userEmail||c.id)}')">
        <div class="conv-name">${esc(c.userName||c.id)}</div>
        <div class="conv-email">${esc(c.userEmail||'')}</div>
        <div class="conv-prev">${esc(c.lastMessage||'')}</div>
      </div>`).join('');
  });
}

function openConv(key, name, email) {
  activeCKey = key;
  document.querySelectorAll('.conv-item').forEach(el=>el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const single = document.getElementById('chatSingle');
  single.innerHTML = `
    <div style="padding:10px 14px 9px;border-bottom:1px solid var(--divider);background:#fafff5;flex-shrink:0">
      <div style="font-size:14px;font-weight:700">${esc(name)}</div>
      <div style="font-size:11px;color:var(--hint)">${esc(email)}</div>
    </div>
    <div class="chat-messages" id="chatMsgs"></div>
    <div class="chat-bar">
      <textarea id="chatTa" class="chat-ta" placeholder="Ответить клиенту…" rows="1"
        oninput="grow(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAdm('${esc(key)}');}"></textarea>
      <button class="btn-send" onclick="sendAdm('${esc(key)}')">➤</button>
    </div>`;
  if (chatSub) chatSub();
  chatSub = db.collection('chats').doc(key).collection('messages')
    .orderBy('timestamp').onSnapshot(snap => {
      const el = document.getElementById('chatMsgs'); if (!el) return;
      if (!snap.docs.length) { el.innerHTML='<div class="chat-empty"><div class="chat-empty-txt">Нет сообщений</div></div>'; return; }
      el.innerHTML = snap.docs.map(d => {
        const m = d.data();
        const t = m.timestamp ? new Date(m.timestamp.seconds*1000).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) : '';
        const isA = m.role==='admin';
        return `<div class="bubble ${isA?'bubble-in':'bubble-out'}">
          <div class="bubble-label">${isA?'Администратор':esc(name)}</div>
          ${esc(m.text)}<div class="bubble-time">${t}</div>
        </div>`;
      }).join('');
      el.scrollTop = el.scrollHeight;
    });
}

async function sendAdm(key) {
  const ta = document.getElementById('chatTa');
  const text = ta.value.trim(); if (!text) return;
  ta.value=''; grow(ta);
  try {
    await db.collection('chats').doc(key).collection('messages').add({
      text, role:'admin',
      senderId: auth.currentUser?.uid || 'admin',
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('chats').doc(key).set({
      lastMessage:'✓ '+text,
      lastTimestamp: firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  } catch(e) { toast('Ошибка: '+e.message,'err'); }
}

// ── Utils ─────────────────────────────────────────
function grow(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}
function toast(msg, type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=type?`show ${type}`:'show';
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='',3000);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SW ────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
